<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Babuu Products</title>

<style>
body{
margin:0;
font-family:Arial;
background:#FFF6E9;
color:#6B5B52;
}

/* HEADER */
header{
background:#F8D7DA;
padding:20px;
text-align:center;
}

/* NAV */
nav{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
padding:10px;
}

nav a{
background:white;
padding:10px 14px;
border-radius:12px;
text-decoration:none;
color:#6B5B52;
font-weight:bold;
}

/* 🔥 FILTER BAR */
.filter-box{
display:flex;
gap:10px;
padding:10px;
overflow-x:auto;
white-space:nowrap;
background:#fff;
border-bottom:1px solid #eee;
position:sticky;
top:0;
z-index:10;
}

.filter-box button{
flex:0 0 auto;
padding:8px 14px;
border:none;
border-radius:12px;
background:white;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
cursor:pointer;
font-weight:bold;
color:#6B5B52;
}

.filter-box button:hover{
background:#FFD6E8;
}

/* 🛍️ PRODUCT GRID */
#product-list{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:15px;
}

.card{
background:white;
padding:15px;
border-radius:15px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:120px;
object-fit:cover;
border-radius:10px;
margin-bottom:10px;
}
</style>
</head>

<body>

<header>
<h1>🛍️ Babuu Products</h1>
<p>หมวดหมู่สินค้าของ Babuu</p>
</header>

<nav>
<a href="index.html">🏠 Home</a>
<a href="about.html">ℹ️ About</a>
<a href="service.html">🛠️ Services</a>
<a href="contact.html">📱 Contact</a>
</nav>

<!-- 🔥 FILTER (ครบแล้ว) -->
<div class="filter-box">
<button onclick="filterCategory('all')">ทั้งหมด</button>
<button onclick="filterCategory('ตูน')">ตูน</button>
<button onclick="filterCategory('ของตกแต่ง')">ของตกแต่ง</button>
<button onclick="filterCategory('บ็อค / Block')">บ็อค / Block</button>
<button onclick="filterCategory('เกม / ADS')">เกม / ADS</button>
<button onclick="filterCategory('Effect')">Effect</button>
<button onclick="filterCategory('BG / พื้นหลัง')">BG</button>
<button onclick="filterCategory('Font')">Font</button>
<button onclick="filterCategory('Sticker')">Sticker</button>
<button onclick="filterCategory('Character (หมี)')">Character 🐻</button>
<button onclick="filterCategory('Style IG')">Style IG</button>
<button onclick="filterCategory('Course / เช่า')">Course</button>
</div>

<!-- 🛍️ PRODUCT AREA -->
<div id="product-list"></div>

<script>

const API = "https://script.google.com/macros/s/AKfycbwn5O2T57lvmM4P8log2rjs6MjJw-84pcL7lgQQRkbX96faHDjH77n9CbbmE7oQ9t_B/exec";

let allProducts = [];

/* 📦 โหลดข้อมูล */
fetch(API)
.then(res => res.json())
.then(data => {
    allProducts = data;
    renderProducts(allProducts);
});

/* 🧩 แสดงสินค้า */
function renderProducts(products){
const box = document.getElementById("product-list");
box.innerHTML = "";

products.forEach(p => {
box.innerHTML += `
<div class="card" onclick="openDrive('${p.drive}')">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>${p.price} บาท</p>
</div>
`;
});
}

/* 🔥 FILTER */
function filterCategory(cat){

if(cat === "all"){
renderProducts(allProducts);
return;
}

const filtered = allProducts.filter(p =>
p.category === cat
);

renderProducts(filtered);
}

/* 🔗 เปิด Google Drive */
function openDrive(link){
window.open(link,"_blank");
}

</script>

</body>
</html>
