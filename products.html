<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Babuu Shop</title>

<style>
body{
  font-family:Arial;
  background:#FFF6E9;
  margin:0;
}

header{
  background:#F8D7DA;
  padding:20px;
  text-align:center;
}

/* search */
.search-box{
  text-align:center;
  padding:10px;
}

.search-box input{
  width:90%;
  max-width:400px;
  padding:10px;
  border-radius:12px;
  border:1px solid #ddd;
}

/* filter */
.filter-box{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  justify-content:center;
  padding:10px;
}

.filter-box button{
  padding:8px 10px;
  border:none;
  border-radius:999px;
  background:#ffd1dc;
  cursor:pointer;
}

/* product */
#product-list{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:15px;
}

.product{
  background:white;
  padding:10px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
  cursor:pointer;
}

.product img{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:10px;
}

/* detail */
#detailPage{
  display:none;
  padding:20px;
}

.detail-box{
  background:white;
  padding:15px;
  border-radius:15px;
}

/* 🛒 CART */
.cart-btn{
  position:fixed;
  top:10px;
  right:10px;
  background:#ff8fab;
  color:white;
  padding:10px 15px;
  border:none;
  border-radius:999px;
  cursor:pointer;
}

#cartBox{
  position:fixed;
  top:60px;
  right:10px;
  width:280px;
  background:white;
  border-radius:15px;
  padding:10px;
  box-shadow:0 2px 10px rgba(0,0,0,.2);
  display:none;
}

.cart-item{
  display:flex;
  justify-content:space-between;
  margin:5px 0;
}

.remove{
  color:red;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>🍓 Babuu Shop</h1>
</header>

<!-- 🛒 CART BUTTON -->
<button class="cart-btn" onclick="toggleCart()">
🛒 ตะกร้า (<span id="cartCount">0</span>)
</button>

<!-- 🛒 CART BOX -->
<div id="cartBox">
<h3>ตะกร้าสินค้า</h3>
<div id="cartItems"></div>
<hr>
<p>รวม: <span id="total">0</span> บาท</p>
</div>

<!-- SEARCH -->
<div class="search-box">
<input type="text" id="searchInput" placeholder="ค้นหาสินค้า..." onkeyup="searchProduct()">
</div>

<!-- FILTER -->
<div class="filter-box">
<button onclick="filterCategory('all')">ทั้งหมด</button>
<button onclick="filterCategory('toon')">ตูน</button>
<button onclick="filterCategory('decorate')">ของตกแต่ง</button>
<button onclick="filterCategory('bg')">BG</button>
<button onclick="filterCategory('sticker')">Sticker</button>
</div>

<!-- PRODUCTS -->
<div id="product-list"></div>

<script>

const API = "https://script.googleusercontent.com/macros/echo?user_content_key=...";

let allProducts = [];
let cart = [];

/* load */
fetch(API)
.then(r => r.json())
.then(data => {
  allProducts = data;
  render(allProducts);
});

/* render */
function render(list){
  const box = document.getElementById("product-list");
  box.innerHTML = "";

  list.forEach(p => {
    box.innerHTML += `
      <div class="product">
        <img src="${p.img}">
        <h4>${p.name}</h4>
        <p>${p.price} บาท</p>
        <button onclick="addToCart('${p.name}',${p.price})">+ ใส่ตะกร้า</button>
      </div>
    `;
  });
}

/* add cart */
function addToCart(name,price){
  cart.push({name,price});
  updateCart();
}

/* update cart */
function updateCart(){
  document.getElementById("cartCount").innerText = cart.length;

  const box = document.getElementById("cartItems");
  box.innerHTML = "";

  let total = 0;

  cart.forEach((c,i) => {
    total += Number(c.price);

    box.innerHTML += `
      <div class="cart-item">
        ${c.name} - ${c.price}
        <span class="remove" onclick="removeItem(${i})">❌</span>
      </div>
    `;
  });

  document.getElementById("total").innerText = total;
}

/* remove */
function removeItem(i){
  cart.splice(i,1);
  updateCart();
}

/* toggle cart */
function toggleCart(){
  const box = document.getElementById("cartBox");
  box.style.display = box.style.display === "block" ? "none" : "block";
}

/* search */
function searchProduct(){
  const v = document.getElementById("searchInput").value.toLowerCase();

  render(allProducts.filter(p =>
    p.name.toLowerCase().includes(v)
  ));
}

/* filter */
function filterCategory(cat){
  if(cat === "all") render(allProducts);
  else render(allProducts.filter(p => p.category === cat));
}

</script>

</body>
</html>
