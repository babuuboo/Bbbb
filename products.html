<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Babuu Products</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#FFF6E9;
color:#6B5B52;
}

header{
background:#F8D7DA;
padding:20px;
text-align:center;
}

nav{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
padding:15px;
}

nav a{
background:white;
padding:10px 16px;
border-radius:12px;
text-decoration:none;
color:#6B5B52;
font-weight:bold;
}

/* 🔵 FILTER */
.filter-box{
display:flex;
gap:8px;
overflow-x:auto;
padding:10px;
white-space:nowrap;
}

.filter-box button{
flex:0 0 auto;
padding:8px 12px;
border:none;
border-radius:12px;
background:white;
cursor:pointer;
font-weight:bold;
}

.filter-box button:hover{
background:#FFD6E8;
}

/* 🟣 PRODUCT GRID */
#product-list{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:15px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:140px;
object-fit:cover;
border-radius:10px;
margin-bottom:10px;
}

footer{
margin-top:40px;
padding:20px;
text-align:center;
background:#F8D7DA;
}
</style>

</head>

<body>

<header>
<h1>🛍️ Products</h1>
<p>หมวดหมู่สินค้าของ Babuu</p>
</header>

<nav>
<a href="index.html">🏠 Home</a>
<a href="about.html">ℹ️ About</a>
<a href="service.html">🛠️ Services</a>
<a href="contact.html">📱 Contact</a>
</nav>

<!-- 🔥 FILTER -->
<div class="filter-box">
<button onclick="filterCategory('all')">ทั้งหมด</button>
<button onclick="filterCategory('ตูน')">ตูน</button>
<button onclick="filterCategory('ของตกแต่ง')">ของตกแต่ง</button>
<button onclick="filterCategory('บ็อค / Block')">บ็อค / Block</button>
<button onclick="filterCategory('เกม / ADS')">เกม / ADS</button>
<button onclick="filterCategory('Effect')">Effect</button>
<button onclick="filterCategory('BG / พื้นหลัง')">BG / พื้นหลัง</button>
<button onclick="filterCategory('Font')">Font</button>
<button onclick="filterCategory('Form')">Form</button>
<button onclick="filterCategory('Sticker')">Sticker</button>
<button onclick="filterCategory('เบส')">เบส</button>
<button onclick="filterCategory('ลายเส้น')">ลายเส้น</button>
<button onclick="filterCategory('สัตว์ / ต้าวก้อน')">สัตว์ / ต้าวก้อน</button>
<button onclick="filterCategory('Character (หมี)')">Character 🐻</button>
<button onclick="filterCategory('Style IG')">Style IG</button>
<button onclick="filterCategory('กลุ่มสอนป้าย')">กลุ่มสอนป้าย</button>
<button onclick="filterCategory('สอนทำหัวป้าย')">สอนทำหัวป้าย</button>
<button onclick="filterCategory('กลุ่มรวม')">กลุ่มรวม</button>
<button onclick="filterCategory('ห้อง F')">ห้อง F</button>
<button onclick="filterCategory('Course / เช่า')">Course / เช่า</button>
<button onclick="filterCategory('PNG / BG / เจ้าหญิง')">PNG / BG / เจ้าหญิง</button>
<button onclick="filterCategory('หวย / เบอร์')">หวย / เบอร์</button>
<button onclick="filterCategory('สูบ / สิทธิ์ขาด')">สูบ / สิทธิ์ขาด</button>
</div>

<!-- 🟢 PRODUCT AREA -->
<div id="product-list"></div>

<footer>
Babuu © 2026
</footer>

<!-- ⚙️ SCRIPT -->
<script>
const API = "https://script.google.com/macros/s/AKfycbwn5O2T57lvmM4P8log2rjs6MjJw-84pcL7lgQQRkbX96faHDjH77n9CbbmE7oQ9t_B/exec";

let allProducts = [];

fetch(API)
.then(res => res.json())
.then(data => {
    allProducts = data;
    renderProducts(allProducts);
});

function renderProducts(products){
const box = document.getElementById("product-list");
box.innerHTML = "";

products.forEach(p => {
box.innerHTML += `
<div class="card" onclick="openDrive('${p.drive}')">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>${p.price} บาท</p>
</div>
`;
});
}

/* 🔥 FILTER */
function filterCategory(cat){

if(cat === "all"){
renderProducts(allProducts);
return;
}

const filtered = allProducts.filter(p =>
p.category === cat
);

renderProducts(filtered);
}

function openDrive(link){
window.open(link,"_blank");
}
</script>

</body>
</html>
