<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Babuu</title>

<style>
body{
  font-family:Arial,sans-serif;
  background:#FFF6E9;
  margin:0;
}

/* header */
header{
  background:#F8D7DA;
  padding:20px;
  text-align:center;
}

/* search */
.search-box{
  text-align:center;
  padding:10px;
}
.search-box input{
  width:90%;
  max-width:400px;
  padding:10px;
  border-radius:12px;
  border:1px solid #ddd;
}

/* filter */
.filter-box{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  justify-content:center;
  padding:10px;
}

.filter-box button{
  padding:8px 10px;
  border:none;
  border-radius:999px;
  background:#ffd1dc;
  cursor:pointer;
}

/* product grid */
#product-list{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:15px;
}

.product{
  background:white;
  padding:10px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.product img{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:10px;
}
</style>
</head>

<body>

<header>
<h1>🍓 Babuu Shop</h1>
<p>ร้านของลูกตาล</p>
</header>

<!-- 🔍 SEARCH -->
<div class="search-box">
<input type="text" id="searchInput" placeholder="ค้นหาสินค้า..." onkeyup="searchProduct()">
</div>

<!-- 🔘 FILTER (หมวดหมู่) -->
<div class="filter-box">
<button onclick="filterCategory('all')">ทั้งหมด</button>
<button onclick="filterCategory('toon')">ตูน</button>
<button onclick="filterCategory('decorate')">ของตกแต่ง</button>
<button onclick="filterCategory('block')">บ็อค</button>
<button onclick="filterCategory('ads')">เกม/ADS</button>
<button onclick="filterCategory('effect')">Effect</button>
<button onclick="filterCategory('bg')">BG</button>
<button onclick="filterCategory('font')">Font</button>
<button onclick="filterCategory('sticker')">Sticker</button>
</div>

<!-- 🛍️ PRODUCTS -->
<div id="product-list"></div>

<script>

const API = "https://script.googleusercontent.com/macros/echo?user_content_key=...";
  
let allProducts = [];

/* โหลดข้อมูลจาก Google Sheets */
fetch(API)
.then(res => res.json())
.then(data => {
  allProducts = data;
  renderProducts(allProducts);
});

/* แสดงสินค้า */
function renderProducts(products){
  const box = document.getElementById("product-list");
  box.innerHTML = "";

  products.forEach(p => {
    box.innerHTML += `
      <div class="product" onclick="openDrive('${p.drive}')">
        <img src="${p.img}">
        <h4>${p.name}</h4>
        <p>${p.price} บาท</p>
      </div>
    `;
  });
}

/* 🔍 ค้นหา */
function searchProduct(){
  const value = document.getElementById("searchInput").value.toLowerCase();

  const filtered = allProducts.filter(p =>
    p.name.toLowerCase().includes(value)
  );

  renderProducts(filtered);
}

/* 🔘 หมวดหมู่ */
function filterCategory(cat){
  if(cat === "all"){
    renderProducts(allProducts);
  } else {
    const filtered = allProducts.filter(p => p.category === cat);
    renderProducts(filtered);
  }
}

/* เปิดลิงก์ Drive */
function openDrive(link){
  window.open(link,"_blank");
}

</script>

</body>
</html>
