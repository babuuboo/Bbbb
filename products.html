<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Babuu Shop</title>

<style>
body {
  font-family: sans-serif;
  background: #fff7fb;
  margin: 0;
  padding: 20px;
}

/* หมวดหมู่ */
.category-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 20px;
}

.category-bar button {
  padding: 8px 12px;
  border: none;
  border-radius: 999px;
  cursor: pointer;
  background: #ffd1dc;
  font-size: 13px;
  transition: 0.2s;
}

.category-bar button:hover {
  background: #ff9bb2;
  transform: scale(1.05);
}

/* สินค้า */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 15px;
}

.product-item {
  background: white;
  border-radius: 15px;
  padding: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.price {
  color: #ff4d6d;
  font-weight: bold;
}
</style>
</head>

<body>

<h2>🛍️ Babuu Shop</h2>

<!-- 🔵 หมวดหมู่ทั้งหมด -->
<div class="category-bar">

<button onclick="filterProducts('all')">ทั้งหมด</button>

<button onclick="filterProducts('toon')">ตูน</button>
<button onclick="filterProducts('decorate')">ของตกแต่ง</button>
<button onclick="filterProducts('block')">บ็อค / Block</button>
<button onclick="filterProducts('ads')">เกม / ADS</button>
<button onclick="filterProducts('effect')">Effect</button>
<button onclick="filterProducts('bg')">BG / พื้นหลัง</button>
<button onclick="filterProducts('font')">Font</button>
<button onclick="filterProducts('form')">Form</button>
<button onclick="filterProducts('sticker')">Sticker</button>
<button onclick="filterProducts('base')">เบส</button>
<button onclick="filterProducts('line')">ลายเส้น</button>
<button onclick="filterProducts('animal')">สัตว์ / ต้าวก้อน</button>
<button onclick="filterProducts('character')">Character (หมี)</button>
<button onclick="filterProducts('ig')">Style IG</button>
<button onclick="filterProducts('teach_sign')">กลุ่มสอนป้าย</button>
<button onclick="filterProducts('teach_head')">สอนทำหัวป้าย</button>
<button onclick="filterProducts('group')">กลุ่มรวม</button>
<button onclick="filterProducts('room_f')">ห้อง F</button>
<button onclick="filterProducts('course')">Course / เช่า</button>
<button onclick="filterProducts('png')">PNG / BG / เจ้าหญิง</button>
<button onclick="filterProducts('lottery')">หวย / เบอร์</button>
<button onclick="filterProducts('license')">สูบ / สิทธิ์ขาด</button>

</div>

<!-- 🟣 สินค้าตัวอย่าง -->
<div class="products">

  <div class="product-item" data-category="toon">
    <h3>ตัวอย่างตูน</h3>
    <p class="price">50 บาท</p>
  </div>

  <div class="product-item" data-category="bg">
    <h3>พื้นหลังสวย ๆ</h3>
    <p class="price">30 บาท</p>
  </div>

  <div class="product-item" data-category="sticker">
    <h3>สติ๊กเกอร์น่ารัก</h3>
    <p class="price">25 บาท</p>
  </div>

  <div class="product-item" data-category="character">
    <h3>หมี Character</h3>
    <p class="price">99 บาท</p>
  </div>

</div>

<!-- JS -->
<script>
function filterProducts(category) {
  const items = document.querySelectorAll('.product-item');

  items.forEach(item => {
    if (category === 'all') {
      item.style.display = 'block';
    } else {
      item.style.display =
        (item.dataset.category === category) ? 'block' : 'none';
    }
  });
}
</script>

</body>
</html>
