<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Test Shop</title>
</head>

<body>

<h2>ดูสินค้า</h2>

<!-- ปุ่ม -->
<button onclick="show('all')">ทั้งหมด</button>
<button onclick="show('toon')">ตูน</button>

<hr>

<!-- สินค้า -->
<div id="p1" data-cat="toon">สินค้า ตูน 1</div>
<div id="p2" data-cat="toon">สินค้า ตูน 2</div>
<div id="p3" data-cat="bg">สินค้า BG</div>

<script>
function show(cat){
  const items = document.querySelectorAll('[data-cat]');

  items.forEach(i => {
    if(cat === 'all'){
      i.style.display = 'block';
    } else {
      i.style.display = (i.getAttribute('data-cat') === cat) ? 'block' : 'none';
    }
  });
}
</script>

</body>
</html>
