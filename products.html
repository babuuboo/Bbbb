<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Babuu</title>

<style>
body{
  font-family:Arial,sans-serif;
  background:#FFF6E9;
  margin:0;
}

/* header */
header{
  background:#F8D7DA;
  padding:20px;
  text-align:center;
}

/* search */
.search-box{
  text-align:center;
  padding:10px;
}

.search-box input{
  width:90%;
  max-width:400px;
  padding:10px;
  border-radius:12px;
  border:1px solid #ddd;
}

/* filter */
.filter-box{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  justify-content:center;
  padding:10px;
}

.filter-box button{
  padding:8px 10px;
  border:none;
  border-radius:999px;
  background:#ffd1dc;
  cursor:pointer;
}

/* product grid */
#product-list{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:15px;
}

.product{
  background:white;
  padding:10px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
  cursor:pointer;
}

.product img{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:10px;
}

/* 🔥 DETAIL PAGE */
#detailPage{
  display:none;
  padding:20px;
}

.detail-box{
  background:white;
  padding:15px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.back-btn{
  margin-top:10px;
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:#ffd1dc;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>🍓 Babuu Shop</h1>
<p>ร้านของลูกตาล</p>
</header>

<!-- 🔘 FILTER -->
<div class="filter-box">
<button onclick="filterCategory('all')">ทั้งหมด</button>
<button onclick="filterCategory('toon')">ตูน</button>
<button onclick="filterCategory('decorate')">ของตกแต่ง</button>
<button onclick="filterCategory('block')">บ็อค</button>
<button onclick="filterCategory('ads')">เกม/ADS</button>
<button onclick="filterCategory('effect')">Effect</button>
<button onclick="filterCategory('bg')">BG</button>
<button onclick="filterCategory('font')">Font</button>
<button onclick="filterCategory('sticker')">Sticker</button>
</div>

<!-- 🛍️ PRODUCT LIST -->
<div id="product-list"></div>

<!-- 🔥 DETAIL PAGE -->
<div id="detailPage">
  <div class="detail-box">
    <img id="detailImg" style="width:100%;border-radius:10px;">
    <h2 id="detailName"></h2>
    <p id="detailPrice"></p>

    <button class="back-btn" onclick="backToList()">
      ⬅ ย้อนกลับ
    </button>
  </div>
</div>

<script>

const API = "https://script.googleusercontent.com/macros/echo?user_content_key=...";

let allProducts = [];

/* โหลดข้อมูล */
fetch(API)
.then(res => res.json())
.then(data => {
  allProducts = data;
  renderProducts(allProducts);
});

/* แสดงรายการสินค้า */
function renderProducts(products){
  document.getElementById("product-list").style.display = "grid";
  document.getElementById("detailPage").style.display = "none";

  const box = document.getElementById("product-list");
  box.innerHTML = "";

  products.forEach(p => {
    box.innerHTML += `
      <div class="product" onclick="openDetail('${p.img}','${p.name}','${p.price}')">
        <img src="${p.img}">
        <h4>${p.name}</h4>
        <p>${p.price} บาท</p>
      </div>
    `;
  });
}

/* 🔥 เปิดหน้า detail */
function openDetail(img,name,price){
  document.getElementById("product-list").style.display = "none";
  document.getElementById("detailPage").style.display = "block";

  document.getElementById("detailImg").src = img;
  document.getElementById("detailName").innerText = name;
  document.getElementById("detailPrice").innerText = price + " บาท";
}

/* 🔙 กลับ */
function backToList(){
  document.getElementById("detailPage").style.display = "none";
  document.getElementById("product-list").style.display = "grid";
}

/* หมวดหมู่ */
function filterCategory(cat){
  if(cat === "all"){
    renderProducts(allProducts);
  } else {
    renderProducts(allProducts.filter(p => p.category === cat));
  }
}

</script>

</body>
</html>
