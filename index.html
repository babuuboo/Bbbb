<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Babuu Shop</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#FFF6E9;
}

/* NAV */
.nav{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  justify-content:center;
  padding:10px;
  background:#F8D7DA;
  position:sticky;
  top:0;
  z-index:999;
}

.nav button{
  padding:8px 12px;
  border:none;
  border-radius:999px;
  background:white;
  cursor:pointer;
}

/* PAGE */
.page{
  display:none;
  padding:20px;
}

.page.active{
  display:block;
}

/* PRODUCT */
#product-list{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.product{
  background:white;
  padding:10px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.product img{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:10px;
}

/* CATEGORY */
.catBox{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin-bottom:10px;
}

.catBox button{
  padding:6px 10px;
  border:none;
  border-radius:999px;
  background:#ffd1dc;
  cursor:pointer;
}

/* CONTACT */
a{
  display:block;
  margin:5px 0;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<button onclick="showPage('home')">🏠 ร้านค้า</button>
<button onclick="showPage('product')">🛍 สินค้า</button>
<button onclick="showPage('font')">🔤 ฟอนต์</button>
<button onclick="showPage('service')">💼 บริการ</button>
<button onclick="showPage('contact')">📞 ติดต่อ</button>
</div>

<!-- 🏠 HOME -->
<div id="home" class="page active">
<h2>🏠 หน้าร้านค้า</h2>
<p>ยินดีต้อนรับสู่ร้าน Babuu 💖</p>
<p>ใส่ข้อมูลร้านตรงนี้ได้เลย</p>
</div>

<!-- 🛍 PRODUCT -->
<div id="product" class="page">

<h2>🛍 สินค้า</h2>

<div class="catBox" id="catBox"></div>

<div id="product-list"></div>

</div>

<!-- 🔤 FONT -->
<div id="font" class="page">
<h2>🔤 ฟอนต์</h2>
<p>รวมฟอนต์ทั้งหมด</p>
</div>

<!-- 💼 SERVICE -->
<div id="service" class="page">
<h2>💼 บริการ</h2>
<p>รายละเอียดบริการ</p>
</div>

<!-- 📞 CONTACT -->
<div id="contact" class="page">
<h2>📞 ติดต่อ</h2>

<a href="#">Instagram</a>
<a href="#">TikTok</a>
<a href="#">LINE</a>
<a href="#">Facebook</a>
</div>

<script>

/* =======================
   PAGE SWITCH
======================= */
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>{
    p.classList.remove('active');
  });
  document.getElementById(id).classList.add('active');
}

/* =======================
   GOOGLE SHEET API
======================= */
const API = "https://script.google.com/macros/s/AKfycbzPF9ctkc9qCLYY53vqfAhHaJ9crGmevjflKzC063ZRUw1taeiNI6KrUQ-bOOp4_Sv6/exec";

let allProducts = [];
let currentCat = "all";

fetch(API)
.then(res=>res.json())
.then(data=>{
  allProducts = data;
  renderCategories();
  render(allProducts);
});

/* =======================
   CATEGORY
======================= */
function renderCategories(){
  const cats = ["all", ...new Set(allProducts.map(p=>p.category))];

  document.getElementById("catBox").innerHTML =
    cats.map(c=>`
      <button onclick="filterCat('${c}')">${c}</button>
    `).join("");
}

function filterCat(cat){
  currentCat = cat;

  if(cat === "all"){
    render(allProducts);
  }else{
    render(allProducts.filter(p=>p.category === cat));
  }
}

/* =======================
   PRODUCT
======================= */
function render(list){
  const box = document.getElementById("product-list");
  box.innerHTML = "";

  list.forEach(p=>{
    box.innerHTML += `
      <div class="product">
        <img src="${p.img}">
        <h4>${p.name}</h4>
        <p>${p.price} บาท</p>
      </div>
    `;
  });
}

</script>

</body>
</html>
